<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Intership Project</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    
    <style>
      body {
        padding: 0;
        margin: 0;
        overflow: hidden;
        background-color: #000000;
        touch-action: none;
      }
      
      #unity-container {
        position: absolute;
        width: 100vw;
        height: 100vh;
        left: 0;
        top: 0;
      }
      
      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      
      #loading-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: sans-serif;
        font-size: 20px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="loading-text">Cargando juego... 0%</div>
    </div>

    <script src="Build/demowebGL.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingText = document.querySelector("#loading-text");

      var buildUrl = "Build";
      var config = {
        dataUrl: buildUrl + "/demowebGL.data.unityweb",
        frameworkUrl: buildUrl + "/demowebGL.framework.js.unityweb",
        codeUrl: buildUrl + "/demowebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Intership Project",
        productVersion: "0.1"
      };

      createUnityInstance(canvas, config, (progress) => {
        loadingText.innerText = "Cargando juego... " + Math.round(progress * 100) + "%";
      }).then((unityInstance) => {
        loadingText.style.display = "none"; 
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
